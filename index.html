const TODAY = today(); // kept for compatibility but now matches local date

// Get ISO week number
const isoWeek = (dateStr) => {
  const d = new Date(dateStr + "T12:00");
  d.setHours(12, 0, 0, 0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const y = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - y) / 86400000) + 1) / 7);
};

const weekKey = (dateStr) => {
  const d = new Date(dateStr + "T12:00");
  const year = d.getFullYear();
  return `${year}-W${String(isoWeek(dateStr)).padStart(2,"0")}`;
};

// Label for a week key
const weekLabel = (wk) => {
  const [year, w] = wk.split("-W");
  const jan1 = new Date(+year, 0, 1);
  const dayOffset = (1 - jan1.getDay() + 7) % 7; // Monday
  const monday = new Date(jan1);
  monday.setDate(jan1.getDate() + dayOffset + (+w - 1) * 7);
  return `${monday.getDate()}/${monday.getMonth()+1}`;
};

// Last N weeks keys
const lastNWeeks = (n) => {
  const keys = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(TODAY + "T12:00");
    d.setDate(d.getDate() - i * 7);
    keys.push(weekKey(d.toISOString().slice(0, 10)));
  }
  return [...new Set(keys)];
};

// ── Pure calorie functions ─────────────────────────────────────────────────────
function calculateBMR(profile) {
  const w = +profile.weight, h = +profile.height, a = +profile.age;
  if (!w || !h || !a) return 0;
  return profile.sex === "F"
    ? 10*w + 6.25*h - 5*a - 161
    : 10*w + 6.25*h - 5*a + 5;
}

function calculateTDEE(profile) {
  const bmr = calculateBMR(profile);
  const factor = ACTIVITY_FACTORS.find(f => f.id === profile.activity)?.mult || 1.55;
  return Math.round(bmr * factor);
}

function calculateCalorieTarget(profile) {
  const tdee  = calculateTDEE(profile);
  const phase = PHASES.find(p => p.id === profile.phase) || PHASES[1];
  const rhy   = RHYTHM_OPTIONS.find(r => r.id === profile.rhythm) || RHYTHM_OPTIONS[1];
  let delta = 0;
  if (profile.phase === "seche")  delta = -rhy.delta;
  if (profile.phase === "masse")  delta = +rhy.delta;
  const kcal  = Math.max(1200, tdee + delta);
  const prot  = Math.round(+profile.weight * (profile.phase === "seche" ? 2.2 : profile.phase === "masse" ? 2.0 : 1.8));
  const fat   = Math.round((kcal * 0.25) / 9);
  const carbs = Math.max(0, Math.round((kcal - prot*4 - fat*9) / 4));
  return { kcal, protein: prot, carbs, fat, tdee };
}

// Get today's quote based on day of year
const getDailyQuote = () => {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const diff = new Date() - start;
  const dayOfYear = Math.floor(diff / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
};

// Units supported + conversion to grams
const UNITS = ["g","ml","cl"];
const toGrams = (qty, unit, food) => {
  if (unit === "g")  return qty;
  if (unit === "ml") return food.densityCl ? qty * (food.densityCl / 10) : qty; // g/ml = densityCl/10
  if (unit === "cl") return food.densityCl ? qty * food.densityCl : qty * 10;  // g/cl
  return qty;
};

const computeFood = (food, qty, unit="g") => {
  const grams = toGrams(qty||0, unit, food);
  const r = grams / 100;
  return {kcal:Math.round(food.cal*r), p:+(food.p*r).toFixed(1), c:+(food.c*r).toFixed(1), f:+(food.f*r).toFixed(1)};
};
const mealTotals = (meal,bank) => meal.items.reduce((acc,it)=>{
  const food=bank.find(f=>f.id===it.foodId); if(!food) return acc;
  const m=computeFood(food, it.qty, it.unit||"g");
  return {kcal:acc.kcal+m.kcal, p:+(acc.p+m.p).toFixed(1), c:+(acc.c+m.c).toFixed(1), f:+(acc.f+m.f).toFixed(1)};
},{kcal:0,p:0,c:0,f:0});
const dayTotals = (meals,bank) => meals.reduce((acc,m)=>{
  const t=mealTotals(m,bank);

// ─── FIT FILE DECODER ─────────────────────────────────────────────────────────
// Compatible Coros, Garmin, Polar
// Fix: handles developer fields (Coros uses them in RECORD messages)
function decodeFIT(buffer) {
  const bytes = new Uint8Array(buffer);
  const view  = new DataView(buffer);
  const logs  = [];
  const log   = m => logs.push(m);

  const headerSize = bytes[0];
  const magic = String.fromCharCode(bytes[8],bytes[9],bytes[10],bytes[11]);
  if (magic !== '.FIT') throw new Error(`Magic invalide: "${magic}"`);
  const dataSize = view.getUint32(4, true);
  log(`FIT: ${buffer.byteLength}B, header=${headerSize}, data=${dataSize}`);

  const SPORT_MAP = {
    0:'Autre',1:'Running',2:'Cycling',3:'Transition',4:'Musculation',
    5:'Natation',10:'Trail',11:'Marche',13:'Rowing',15:'Climbing',
    17:'Ski',19:'Hiking',24:'Triathlon',37:'Yoga',
  };

  const defs     = {};   // localN → { gMsgN, bigEnd, fields[] }
  const defSizes = {};   // localN → total bytes (including dev fields)
  let pos = headerSize;
  const end = Math.min(headerSize + dataSize, buffer.byteLength - 2);

  const records = [];
  let sessionData = null;

  function readUint(p, sz, le) {
    try {
      if (sz === 1) return bytes[p];
      if (sz === 2) return view.getUint16(p, le);
      if (sz === 4) return view.getUint32(p, le);
    } catch(e) { return 0; }
    return 0;
  }

  while (pos < end) {
    if (pos >= buffer.byteLength) break;
    const hdr = bytes[pos++];

    // Compressed timestamp record
    if (hdr & 0x80) {
      const localN2 = (hdr >> 5) & 0x03;
      if (defSizes[localN2] !== undefined) {
        // Read as a full data message to capture RECORD data
        const def2 = defs[localN2];
        if (def2) {
          const startP = pos;
          const le2 = !def2.bigEnd;
          const msg2 = {};
          for (const f of def2.fields) {
            if (pos + f.sz > end) break;
            if (f.fd >= 0) msg2[f.fd] = readUint(pos, f.sz, le2);
            pos += f.sz;
          }
          pos = startP + defSizes[localN2]; // always advance exactly
          if (def2.gMsgN === 20) records.push(msg2);
        } else {
          pos += defSizes[localN2];
        }
      }
      continue;
    }

    const isDef  = (hdr & 0x40) !== 0;
    const hasDev = (hdr & 0x20) !== 0;
    const localN = hdr & 0x0F;

    if (isDef) {
      if (pos + 5 > end) break;
      pos++; // reserved
      const bigEnd = bytes[pos++] === 1;
      const le = !bigEnd;
      const gMsgN = view.getUint16(pos, le); pos += 2;
      const nF = bytes[pos++];
      const fields = [];
      let totalSz = 0;
      for (let i = 0; i < nF && pos + 3 <= end; i++) {
        const fd = bytes[pos++], sz = bytes[pos++], bt = bytes[pos++];
        fields.push({ fd, sz, bt });

          const fd2 = bytes[pos++], sz2 = bytes[pos++];

          totalSz += sz2;

    }

    const le  = !def.bigEnd;
    const startP = pos;
    const msg = {};
    for (const f of def.fields) {
      if (pos + f.sz > end) break;
      if (f.fd >= 0) msg[f.fd] = readUint(pos, f.sz, le); // skip dev fields (fd=-1)
      pos += f.sz;
    }

    if (def.gMsgN === 18) sessionData = msg;         // SESSION
  }

    if (s[9]  !== undefined && s[9]<INV4)  result.distance = +(s[9] / 100000).toFixed(3);

    if (!result.maxHR && s[17] !== undefined && s[17]<INV1) result.maxHR = s[17];

    // Estimate calories if missing
    if (!result.calories && result.duration) {
      const MET = result.sport==='Running'?9:result.sport==='Cycling'?7:5;
      result.calories = Math.round(MET * 70 * result.duration / 3600);
    }
    log(`Records: dur=${result.duration}s dist=${result.distance}km hr=${result.avgHR}`);
  }

  if (!result.sport) result.sport = 'Running';
  return result;
}

// ─── APPLE HEALTH XML PARSER ──────────────────────────────────────────────────
function parseAppleHealth(xmlText) {
  const parser   = new DOMParser();
  const doc      = parser.parseFromString(xmlText, 'text/xml');
  const records  = Array.from(doc.querySelectorAll('Record'));
  const workouts = Array.from(doc.querySelectorAll('Workout'));
  const results  = { workouts:[], steps:[], sleep:[], heartRate:[] };

  workouts.forEach(w => {
    const type    = w.getAttribute('workoutActivityType') || '';
    const dur     = parseFloat(w.getAttribute('duration')) || 0;
    const durUnit = w.getAttribute('durationUnit') || 'min';
    const dist    = parseFloat(w.getAttribute('totalDistance')) || 0;
    const cal     = parseFloat(w.getAttribute('totalEnergyBurned')) || 0;
    const start   = w.getAttribute('startDate') || '';
    const WTYPE   = {
      'HKWorkoutActivityTypeRunning':'Running',
      'HKWorkoutActivityTypeCycling':'Cycling',
      'HKWorkoutActivityTypeWalking':'Marche',
      'HKWorkoutActivityTypeSwimming':'Natation',
      'HKWorkoutActivityTypeTraditionalStrengthTraining':'Musculation',
      'HKWorkoutActivityTypeHiking':'Trail',
    };
    results.workouts.push({
      type: WTYPE[type] || 'Autre', start,
      duration: durUnit==='min' ? Math.round(dur) : Math.round(dur/60),
      distance: +dist.toFixed(2), calories: Math.round(cal),
    });
  });

  const stepRecs = records.filter(r => r.getAttribute('type')==='HKQuantityTypeIdentifierStepCount');
  const stepsByDay = {};
  stepRecs.forEach(r => {
    const day = (r.getAttribute('startDate')||'').slice(0,10);
    stepsByDay[day] = (stepsByDay[day]||0) + parseFloat(r.getAttribute('value')||0);
  });
  results.steps = Object.entries(stepsByDay).map(([date,steps])=>({date,steps:Math.round(steps)}));

  const hrRecs = records.filter(r => r.getAttribute('type')==='HKQuantityTypeIdentifierHeartRate');
  const hrByDay = {};
  hrRecs.forEach(r => {
    const day = (r.getAttribute('startDate')||'').slice(0,10);
    if (!hrByDay[day]) hrByDay[day] = [];
    hrByDay[day].push(parseFloat(r.getAttribute('value')||0));
  });
  results.heartRate = Object.entries(hrByDay).map(([date,vals])=>({
    date, avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length), max:Math.round(Math.max(...vals))
  }));

  const sleepRecs = records.filter(r => r.getAttribute('type')==="HKCategoryTypeIdentifierSleepAnalysis");
  const sleepByDay = {};
  sleepRecs.forEach(r => {
    const day = (r.getAttribute('startDate')||'').slice(0,10);
    const val = r.getAttribute('value')||'';
    const dur2 = (new Date(r.getAttribute('endDate')) - new Date(r.getAttribute('startDate'))) / 3600000;
    if (!sleepByDay[day]) sleepByDay[day] = {total:0,deep:0,rem:0};
    sleepByDay[day].total += dur2;
    if (val.includes('Deep')) sleepByDay[day].deep += dur2;
    if (val.includes('REM'))  sleepByDay[day].rem  += dur2;
  });
  results.sleep = Object.entries(sleepByDay).map(([date,s])=>({
    date, total:+s.total.toFixed(1), deep:+s.deep.toFixed(1), rem:+s.rem.toFixed(1)
  }));

  return results;
}

// ── Aggregation helpers ──────────────────────────────────────────────────────
const CARDIO_TYPES = ["Running","Vélo","Natation","Randonnée","Hybride"];

function getWorkoutDist(wo) {
  if (!wo.blocks) return 0;
  return wo.blocks.reduce((sum,b) => {
    const d    = parseFloat(b.distance) || 0;
    const reps = b.kind==="repeat" ? (parseInt(b.reps)||1) : 1;
    return sum + d * reps;
  }, 0);
}

function getWorkoutDuration(wo) { return wo.duration || 0; }

function getWorkoutBpm(wo) {
  if (!wo.blocks) return null;
  const bpms = wo.blocks.map(b => parseFloat(b.bpm)).filter(Boolean);
  return bpms.length ? Math.round(bpms.reduce((a,b)=>a+b,0)/bpms.length) : null;
}

function getWorkoutElevation(wo) {
  if (!wo.blocks) return 0;
  return wo.blocks.reduce((sum,b) => sum + (parseFloat(b.elevation)||0), 0);
}

function getMuscuVolume(wo) {
  return (wo.exercises||[]).reduce((a,ex) => {
    const items = ex.items || [{sets:ex.sets||[]}];
    return a + items.reduce((b,it) => b + it.sets.reduce((c,s) => c+(s.w||0)*(s.r||0),0),0);
  },0);
}

function getMuscuSets(wo) {
  return (wo.exercises||[]).reduce((a,ex) => {
    const items = ex.items || [{sets:ex.sets||[]}];
    return a + items.reduce((b,it)=>b+it.sets.length,0);
  },0);
}

// Date helpers
function getWeekStart(dateStr) {
  const d = new Date(dateStr+"T12:00");
  const day = d.getDay() === 0 ? 6 : d.getDay() - 1; // Monday=0
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0,10);
}
function getMonthKey(dateStr) { return dateStr.slice(0,7); }
function getYearKey(dateStr)  { return dateStr.slice(0,4); }

// Filter workouts by period
function filterByPeriod(workouts, period) {
  const now = new Date(TODAY+"T12:00");
  return workouts.filter(wo => {
    const d = new Date(wo.date+"T12:00");
    if (period==="week")  return getWeekStart(wo.date)===getWeekStart(TODAY);
    if (period==="month") return getMonthKey(wo.date)===getMonthKey(TODAY);
    if (period==="year")  return getYearKey(wo.date)===getYearKey(TODAY);
    return true; // "all"
  });
}

// Aggregate stats for a list of workouts
function aggregateStats(workouts) {
  let sessions=0, distKm=0, durationMin=0, elevM=0, bpmSum=0, bpmCount=0, muscuVol=0, muscuSets=0;
  const byType = {};
  workouts.forEach(wo => {
    sessions++;
    const t = wo.type;
    if (!byType[t]) byType[t] = {sessions:0,dist:0,duration:0,vol:0,sets:0,bpmSum:0,bpmCount:0};
    byType[t].sessions++;
    byType[t].duration += getWorkoutDuration(wo);
    durationMin += getWorkoutDuration(wo);
    if (CARDIO_TYPES.includes(t)) {
      const d = getWorkoutDist(wo);
      const e = getWorkoutElevation(wo);
      const b = getWorkoutBpm(wo);
      distKm += d; byType[t].dist += d;
      elevM  += e;
      if (b) { bpmSum+=b; bpmCount++; byType[t].bpmSum+=b; byType[t].bpmCount++; }
    }
    if (t==="Musculation") {
      const v = getMuscuVolume(wo), s = getMuscuSets(wo);
      muscuVol += v; muscuSets += s;
      byType[t].vol += v; byType[t].sets += s;
    }
  });
  return {
    sessions, distKm:+distKm.toFixed(1), durationMin, elevM:Math.round(elevM),
    muscuVol:Math.round(muscuVol), muscuSets,
    byType,
  };
}

// Build time-series data (week/month) for a given metric
function buildTimeSeries(workouts, groupBy, metricFn) {
  const groups = {};
  workouts.forEach(wo => {
    const key = groupBy==="week" ? getWeekStart(wo.date) : getMonthKey(wo.date);
    if (!groups[key]) groups[key] = { key, total:0, count:0 };
    const v = metricFn(wo);
    if (v > 0) { groups[key].total += v; groups[key].count++; }
  });
  return Object.values(groups).sort((a,b)=>a.key.localeCompare(b.key));
}

// Format duration min → "1h 23m"
function fmtDur(min) {
  if (!min) return "0m";
  const h = Math.floor(min/60), m = min%60;
  return h ? `${h}h${m>0?` ${m}m`:""}` : `${m}m`;
}

function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}
function migrateData(saved){
  if(!saved) return null;
  if(saved.data?.nutrition && (!saved.data.nutrition.foodBank || saved.data.nutrition.foodBank.length===0)){
    saved.data.nutrition.foodBank = FOOD_BANK_SEED;
  }
  if(saved.data?.nutrition && !saved.data.nutrition.water){

  if(!saved.data?.steps) {
    if(saved.data) saved.data.steps = {};

  if(!saved.data?.goals?.steps) {
    if(saved.data?.goals) saved.data.goals.steps = 10000;
  }
  return saved;
}
